<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Mission ASVAB</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream-100); color: var(--text-primary); }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; background: var(--white); border-bottom: 1px solid var(--cream-200); }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 700; color: var(--navy-900); text-decoration: none; }
    .logo span { color: var(--gold-500); }
    .admin-badge { font-size: 0.75rem; font-weight: 700; background: var(--navy-900); color: var(--gold-500); padding: 0.25rem 0.75rem; border-radius: 99px; letter-spacing: 0.08em; text-transform: uppercase; }
    .sign-out-btn { background: none; border: 1.5px solid var(--cream-200); border-radius: 8px; padding: 0.5rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; cursor: pointer; }

    main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.25rem; font-weight: 700; margin-bottom: 2rem; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem; }
    @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card { background: var(--white); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 700; color: var(--navy-900); line-height: 1; }
    .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }

    /* Filters */
    .filters { background: var(--white); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 0.35rem; min-width: 140px; }
    .filter-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); }
    .filter-group input, .filter-group select { padding: 0.6rem 0.75rem; border: 1.5px solid var(--cream-200); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; }
    .filter-group.search { flex: 1; min-width: 200px; }
    .filter-actions { display: flex; gap: 0.75rem; align-items: center; }
    .btn-primary { padding: 0.65rem 1.25rem; background: var(--navy-900); color: var(--white); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; }
    .btn-export { padding: 0.65rem 1.25rem; background: var(--gold-500); color: var(--navy-900); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; }

    /* Sortable headers */
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--navy-900); }
    th .sort-ind { color: var(--gold-text); margin-left: 0.25rem; font-size: 0.7rem; }
    .admin-badge-mini { display: inline-block; font-size: 0.65rem; font-weight: 700; background: var(--navy-900); color: var(--gold-500); padding: 0.1rem 0.4rem; border-radius: 99px; letter-spacing: 0.05em; text-transform: uppercase; margin-left: 0.4rem; vertical-align: middle; }

    /* Action buttons in modal */
    .modal-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--cream-200); }
    .btn-action { padding: 0.5rem 0.9rem; border: 1.5px solid var(--cream-200); background: var(--white); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; color: var(--text-primary); }
    .btn-action:hover { border-color: var(--navy-600); }
    .btn-action.danger { color: #b94a4a; }
    .btn-action.danger:hover { border-color: #b94a4a; background: #fff5f5; }
    .action-status { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; min-height: 1em; }
    .action-status.ok { color: #2f7d4f; }
    .action-status.err { color: #b94a4a; }

    /* Table */
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .table-count { font-size: 0.875rem; color: var(--text-secondary); }
    .table-wrap { background: var(--white); border-radius: 12px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); border-bottom: 1px solid var(--cream-200); white-space: nowrap; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--cream-200); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--cream-100); }
    tbody tr { cursor: pointer; }

    /* Drill-in modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.55); display: none; align-items: flex-start; justify-content: center; z-index: 100; padding: 2rem 1rem; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 14px; max-width: 880px; width: 100%; padding: 2rem; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); line-height: 1; }
    .modal h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; margin-bottom: 0.25rem; }
    .modal .sub { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .modal-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .modal-stat { background: var(--cream-100); border-radius: 10px; padding: 0.85rem 1rem; }
    .modal-stat .v { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; line-height: 1; }
    .modal-stat .l { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.25rem; }
    .modal h3 { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin: 1.25rem 0 0.5rem; }
    .attempts-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .attempts-table th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); border-bottom: 1px solid var(--cream-200); }
    .attempts-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--cream-200); }
    .attempts-table tr:last-child td { border-bottom: none; }
    .trend-up { color: #2f7d4f; font-weight: 600; }
    .trend-down { color: #b94a4a; font-weight: 600; }
    .trend-flat { color: var(--text-secondary); }
    .section-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.5rem; }
    .section-pill { background: var(--cream-100); border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.85rem; }
    .section-pill .code { font-weight: 700; color: var(--navy-900); }
    .section-pill .val { color: var(--text-secondary); font-size: 0.8rem; }
    .empty-note { color: var(--text-secondary); font-size: 0.9rem; padding: 1rem; text-align: center; background: var(--cream-100); border-radius: 8px; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Mission <span>ASVAB</span></a>
    <div style="display:flex; align-items:center; gap:1rem;">
      <span class="admin-badge">Admin</span>
      <button class="sign-out-btn">Sign Out</button>
    </div>
  </nav>

  <main>
    <h1>Leads &amp; Registrations</h1>

    <!-- Summary Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">&mdash;</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statNewThisWeek">&mdash;</div>
        <div class="stat-label">New This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statActive">&mdash;</div>
        <div class="stat-label">Took a Test</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statAvgAfqt">&mdash;</div>
        <div class="stat-label">Avg. Best AFQT</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-group search">
        <label for="filterSearch">Search</label>
        <input type="text" id="filterSearch" placeholder="Name or email">
      </div>
      <div class="filter-group">
        <label for="filterFrom">Joined From</label>
        <input type="date" id="filterFrom">
      </div>
      <div class="filter-group">
        <label for="filterTo">Joined To</label>
        <input type="date" id="filterTo">
      </div>
      <div class="filter-group">
        <label for="filterEducation">Education</label>
        <select id="filterEducation">
          <option value="">All</option>
          <option>Some High School</option>
          <option>High School Diploma / GED</option>
          <option>Some College</option>
          <option>College Graduate</option>
          <option>Graduate Degree</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filterZip">ZIP Code</label>
        <input type="text" id="filterZip" placeholder="e.g. 902">
      </div>
      <div class="filter-group">
        <label for="filterMinTests">Min Tests</label>
        <input type="number" id="filterMinTests" placeholder="0" min="0" style="width:90px;">
      </div>
      <div class="filter-actions">
        <button class="btn-primary">Apply</button>
        <button class="btn-export">Export CSV</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-header">
      <span class="table-count" id="filteredCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr id="adminTableHead">
            <th class="sortable" data-sort="name" aria-sort="none">Name <span class="sort-ind" data-for="name" aria-hidden="true"></span></th>
            <th class="sortable" data-sort="email" aria-sort="none">Email <span class="sort-ind" data-for="email" aria-hidden="true"></span></th>
            <th class="sortable" data-sort="age" aria-sort="none">Age <span class="sort-ind" data-for="age" aria-hidden="true"></span></th>
            <th>Education</th>
            <th>ZIP</th>
            <th class="sortable" data-sort="created_at" aria-sort="descending">Joined <span class="sort-ind" data-for="created_at" aria-hidden="true"></span></th>
            <th class="sortable" data-sort="testCount" aria-sort="none">Tests <span class="sort-ind" data-for="testCount" aria-hidden="true"></span></th>
            <th class="sortable" data-sort="bestAfqt" aria-sort="none">Best AFQT <span class="sort-ind" data-for="bestAfqt" aria-hidden="true"></span></th>
            <th class="sortable" data-sort="lastTestAt" aria-sort="none">Last Test <span class="sort-ind" data-for="lastTestAt" aria-hidden="true"></span></th>
            <th class="sortable" data-sort="lastSignInAt" aria-sort="none">Last Login <span class="sort-ind" data-for="lastSignInAt" aria-hidden="true"></span></th>
          </tr>
        </thead>
        <tbody id="adminTableBody">
          <tr><td colspan="10" style="text-align:center; padding:2rem; color:var(--text-secondary);">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <button class="modal-close" aria-label="Close">&times;</button>
      <div id="userModalContent"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1/dist/umd/supabase.js" integrity="sha384-EjUdIVmzWliPzdzhxZ9ZoO0etXLKWuUPUftAGxP6qH6Lm4oLwoLaJR0Ba4pIDiDL" crossorigin="anonymous"></script>
  <script src="js/auth.js"></script>
  <script src="js/focus-trap.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/page-admin.js"></script>
</body>
</html>
