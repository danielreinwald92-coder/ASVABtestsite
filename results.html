<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASVAB Practice Test - Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-900: #0a1628;
      --navy-800: #132039;
      --navy-700: #1e3a5f;
      --gold-500: #d4a853;
      --gold-400: #e8c17a;
      --gold-300: #f0d69b;
      --cream-100: #faf8f5;
      --cream-200: #f2efe8;
      --white: #ffffff;
      --text-primary: #0a1628;
      --text-secondary: #4a5568;
      --success: #2d8a6e;
      --success-light: #e8f5f0;
      --error: #c53030;
      --error-light: #fef2f2;
      --warning: #b45309;
      --warning-light: #fef3c7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream-100);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 5%;
      background: var(--white);
      border-bottom: 1px solid var(--cream-200);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--navy-900);
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .logo span { color: var(--gold-500); }

    .nav-actions { display: flex; gap: 1rem; }

    .nav-btn {
      padding: 0.6rem 1.25rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .nav-btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--cream-200);
    }

    .nav-btn-secondary:hover {
      border-color: var(--navy-900);
      color: var(--navy-900);
    }

    .nav-btn-primary {
      background: var(--navy-900);
      color: var(--white);
    }

    .nav-btn-primary:hover { background: var(--navy-700); }

    .results-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .score-hero {
      background: var(--white);
      border-radius: 24px;
      padding: 3rem;
      text-align: center;
      box-shadow: 0 8px 40px rgba(10, 22, 40, 0.08);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .score-hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--gold-500), var(--gold-400));
    }

    .completion-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--success-light);
      color: var(--success);
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .completion-badge::before {
      content: "✓";
      font-weight: 700;
    }

    .greeting {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }

    .user-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--navy-900);
      margin-bottom: 2rem;
    }

    .afqt-section { margin-bottom: 2rem; }

    .afqt-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .afqt-score {
      font-family: 'Cormorant Garamond', serif;
      font-size: 6rem;
      font-weight: 700;
      color: var(--navy-900);
      line-height: 1;
    }

    .afqt-percentile {
      font-size: 1rem;
      color: var(--gold-500);
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .score-message {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy-900);
      margin-bottom: 0.5rem;
    }

    .score-description {
      font-size: 0.95rem;
      color: var(--text-secondary);
      max-width: 400px;
      margin: 0 auto;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      animation: fadeIn 0.5s ease-out 0.1s both;
    }

    .stat-card {
      background: var(--white);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(10, 22, 40, 0.06);
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--navy-900);
      line-height: 1;
    }

    .stat-value.correct { color: var(--success); }
    .stat-value.incorrect { color: var(--error); }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    .cta-section {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      animation: fadeIn 0.5s ease-out 0.3s both;
    }

    .cta-btn {
      flex: 1;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .cta-primary {
      background: var(--navy-900);
      color: var(--white);
    }

    .cta-primary:hover {
      background: var(--navy-700);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(10, 22, 40, 0.2);
    }

    .cta-secondary {
      background: var(--white);
      color: var(--navy-900);
      border: 2px solid var(--cream-200);
    }

    .cta-secondary:hover { border-color: var(--navy-900); }

    @media (max-width: 768px) {
      nav { padding: 1rem; flex-wrap: wrap; gap: 0.75rem; }
      .logo { font-size: 1.5rem; }
      .nav-actions { gap: 0.5rem; }
      .nav-btn { padding: 0.6rem 1rem; font-size: 0.85rem; }

      .results-container { padding: 1.5rem 1rem; }
      .score-hero { padding: 1.5rem; border-radius: 16px; }
      .completion-badge { font-size: 0.75rem; padding: 0.4rem 0.8rem; }
      .greeting { font-size: 1rem; }
      .user-name { font-size: 1.25rem; }
      .afqt-score { font-size: 3.5rem; }
      .score-label { font-size: 0.9rem; }
      .score-description { font-size: 0.9rem; padding: 0 0.5rem; }

      .stats-row { grid-template-columns: 1fr; gap: 0.75rem; }
      .stat-card { padding: 1.25rem; }
      .stat-value { font-size: 1.75rem; }
      .stat-label { font-size: 0.85rem; }

      .cta-section {
        flex-direction: column;
        padding: 1.5rem;
        gap: 0.75rem;
      }
      .cta-btn {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      nav { justify-content: center; }
      .logo { width: 100%; text-align: center; }
      .nav-actions { width: 100%; justify-content: center; }

      .afqt-score { font-size: 3rem; }
      .user-name { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">ASVAB<span>Pro</span></a>
    <div class="nav-actions">
      <a href="index.html" class="nav-btn nav-btn-secondary">Back to Home</a>
      <a href="select-test.html" class="nav-btn nav-btn-primary">Take Another Test</a>
    </div>
  </nav>

  <main class="results-container">
    <section class="score-hero">
      <div class="completion-badge">Test Complete</div>
      <p class="greeting">Great work,</p>
      <h1 class="user-name" id="userName">Test Taker</h1>

      <div class="afqt-section">
        <p class="afqt-label">Estimated AFQT Score</p>
        <div class="afqt-score" id="afqtScore">--</div>
        <p class="afqt-percentile" id="afqtPercentile">--th Percentile</p>
      </div>

      <h2 class="score-message" id="scoreMessage">Calculating...</h2>
      <p class="score-description" id="scoreDescription">Loading your results...</p>
    </section>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value correct" id="correctCount">--</div>
        <div class="stat-label">Correct Answers</div>
      </div>
      <div class="stat-card">
        <div class="stat-value incorrect" id="incorrectCount">--</div>
        <div class="stat-label">Incorrect Answers</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="timeUsed">--:--</div>
        <div class="stat-label">Time Used</div>
      </div>
    </div>

    <div class="cta-section">
      <a href="select-test.html" class="cta-btn cta-primary">Take Another Test →</a>
      <a href="index.html" class="cta-btn cta-secondary">Back to Home</a>
    </div>
  </main>

  <script>
    function loadResults() {
      const results = JSON.parse(localStorage.getItem('quizResults'));
      const userName = localStorage.getItem('asvabUserName') || 'Test Taker';

      if (!results) {
        document.getElementById('scoreMessage').textContent = 'No results found';
        document.getElementById('scoreDescription').textContent = 'Please take a practice test first.';
        return;
      }

      document.getElementById('userName').textContent = userName;
      document.getElementById('afqtScore').textContent = results.afqt;
      document.getElementById('afqtPercentile').textContent = `${results.afqt}${getOrdinalSuffix(results.afqt)} Percentile`;
      document.getElementById('correctCount').textContent = results.correct;
      document.getElementById('incorrectCount').textContent = results.incorrect;

      const minutes = Math.floor(results.timeUsed / 60);
      const seconds = results.timeUsed % 60;
      document.getElementById('timeUsed').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

      const score = results.score;
      let message, description;
      if (score >= 90) {
        message = "Outstanding Performance!";
        description = "You're exceptionally well-prepared. You qualify for virtually all military occupations.";
      } else if (score >= 75) {
        message = "Excellent Work!";
        description = "You're well-prepared for the ASVAB. Keep practicing to push your score even higher.";
      } else if (score >= 60) {
        message = "Solid Foundation";
        description = "You're on the right track. Focus on weak areas to improve your score.";
      } else if (score >= 40) {
        message = "Room for Improvement";
        description = "Review the material and practice more. You can significantly improve with focused study.";
      } else {
        message = "Keep Studying";
        description = "Don't give up! Review the basics and take more practice tests to build your skills.";
      }

      document.getElementById('scoreMessage').textContent = message;
      document.getElementById('scoreDescription').textContent = description;
    }

    function getOrdinalSuffix(n) {
      const s = ['th', 'st', 'nd', 'rd'];
      const v = n % 100;
      return s[(v - 20) % 10] || s[v] || s[0];
    }

    document.addEventListener('DOMContentLoaded', loadResults);
  </script>
</body>
</html>
